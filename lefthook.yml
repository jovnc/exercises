pre-commit:
  parallel: false
  commands:
    ruff-lint:
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true

    ruff-format:
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true

    mypy:
      glob: "*.py"
      run: uv run mypy .
